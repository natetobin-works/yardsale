<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:#111; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; overflow:hidden; }

/* ───── SETUP SCREEN ───── */
#setup {
  position:fixed; inset:0; background:#111; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px 20px; gap:18px;
}
#setup h1 { font-size:24px; font-weight:800; color:#f5c842; text-align:center; letter-spacing:-.5px; }
#setup p  { font-size:13px; color:#888; text-align:center; max-width:300px; line-height:1.6; }
.card { background:#1c1c1e; border:1px solid #2c2c2e; border-radius:16px; padding:20px; width:100%; max-width:420px; display:flex; flex-direction:column; gap:14px; }
.field-label { font-size:11px; color:#888; text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }
.addr-input {
  width:100%; padding:13px 15px; background:#2c2c2e; border:1.5px solid #3a3a3c;
  border-radius:10px; color:#fff; font-size:16px; outline:none; transition:border-color .2s;
}
.addr-input:focus { border-color:#f5c842; }
.addr-input::placeholder { color:#555; }
.input-hint { font-size:11px; color:#555; line-height:1.5; }
.err { font-size:12px; color:#ff453a; text-align:center; min-height:18px; }
.btn-yellow { width:100%; padding:15px; background:#f5c842; color:#000; border:none; border-radius:12px; font-size:17px; font-weight:800; cursor:pointer; }
.btn-yellow:disabled { opacity:.4; cursor:default; }
.divider { text-align:center; font-size:11px; color:#444; }
.btn-outline { width:100%; padding:12px; background:transparent; color:#0a84ff; border:1.5px solid #0a84ff; border-radius:12px; font-size:14px; cursor:pointer; }
.btn-outline:disabled { opacity:.4; }

/* ───── MAIN APP ───── */
#app { position:fixed; inset:0; display:none; flex-direction:column; }

/* TOP NAV BAR — shows current address like Google Maps */
#topbar {
  position:absolute; top:0; left:0; right:0; z-index:1000;
  background:rgba(20,20,20,.95); backdrop-filter:blur(10px);
  border-bottom:1px solid #2c2c2e;
  padding:10px 14px 10px;
  display:flex; flex-direction:column; gap:4px;
}
.tb-row1 { display:flex; align-items:center; gap:10px; }
.tb-stop { font-size:11px; color:#f5c842; font-weight:600; text-transform:uppercase; letter-spacing:.06em; flex-shrink:0; }
.tb-addr { font-size:15px; font-weight:700; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tb-dist { font-size:12px; color:#888; flex-shrink:0; }
.tb-row2 { display:flex; align-items:center; gap:7px; }
.gps-dot { width:7px; height:7px; border-radius:50%; background:#444; flex-shrink:0; }
.gps-dot.live { background:#30d158; box-shadow:0 0 5px #30d158; animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.gps-txt { font-size:11px; color:#666; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tb-progress { display:flex; align-items:center; gap:6px; margin-left:auto; }
.tb-pct { font-size:11px; color:#888; }
.prog-bar { width:60px; height:4px; background:#3a3a3c; border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; background:#f5c842; transition:width .4s; border-radius:2px; }

/* MAP fills everything */
#map { position:absolute; inset:0; }

/* BOTTOM PANEL — action buttons */
#bottom {
  position:absolute; bottom:0; left:0; right:0; z-index:1000;
  background:rgba(20,20,20,.97); backdrop-filter:blur(12px);
  border-top:1px solid #2c2c2e;
  padding:12px 14px 20px;
  display:flex; flex-direction:column; gap:10px;
}

/* mini address card above buttons */
.mini-card {
  background:#2c2c2e; border-radius:10px; padding:10px 13px;
  display:flex; align-items:center; gap:10px;
}
.mc-pin { font-size:20px; flex-shrink:0; }
.mc-info { flex:1; min-width:0; }
.mc-label { font-size:10px; color:#f5c842; text-transform:uppercase; letter-spacing:.06em; margin-bottom:2px; }
.mc-addr  { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mc-dist  { font-size:11px; color:#888; margin-top:1px; }

/* 3 action buttons */
.btn-row { display:flex; gap:8px; }
.act-btn {
  flex:1; padding:14px 8px; border:none; border-radius:12px;
  font-size:14px; font-weight:700; cursor:pointer; display:flex;
  flex-direction:column; align-items:center; gap:3px; transition:opacity .15s;
}
.act-btn:active { opacity:.7; }
.act-btn span { font-size:10px; font-weight:500; }
.btn-go   { background:#0a84ff; color:#fff; }
.btn-done { background:#30d158; color:#000; }
.btn-skip { background:#2c2c2e; color:#aaa; border:1px solid #3a3a3c; }

/* LIST TAB */
#listScreen {
  position:absolute; inset:0; z-index:999; background:#111;
  display:none; flex-direction:column; overflow:hidden;
}
#listScreen.on { display:flex; }
.list-scroll { flex:1; overflow-y:auto; }
.list-scroll::-webkit-scrollbar { width:3px; }
.list-scroll::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
.ls-hdr { padding:8px 16px; font-size:11px; color:#666; text-transform:uppercase; letter-spacing:.1em; background:#1c1c1e; position:sticky; top:0; border-bottom:1px solid #222; }
.ls-row { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid #1c1c1e; gap:12px; cursor:pointer; }
.ls-row:active { background:#1c1c1e; }
.ls-row.is-cur { background:rgba(245,200,66,.06); border-left:3px solid #f5c842; }
.ls-row.is-done { opacity:.35; }
.ls-row.is-done .ls-addr { text-decoration:line-through; }
.ls-n    { font-size:11px; color:#555; width:24px; text-align:right; flex-shrink:0; }
.ls-dot  { width:22px; height:22px; border-radius:50%; border:2px solid #3a3a3c; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; }
.ls-dot.cur  { border-color:#f5c842; color:#f5c842; }
.ls-dot.done { background:#30d158; border-color:#30d158; color:#000; }
.ls-info { flex:1; min-width:0; }
.ls-addr { font-size:13px; line-height:1.3; }
.ls-dist { font-size:11px; color:#666; margin-top:1px; }
.ls-tag  { font-size:10px; padding:2px 8px; border-radius:5px; flex-shrink:0; }
.ls-tag.cur  { background:#f5c842; color:#000; font-weight:700; }
.ls-tag.done { background:rgba(48,209,88,.12); color:#30d158; }

/* TAB BAR at very bottom */
#tabbar {
  position:absolute; bottom:0; left:0; right:0; z-index:1001;
  background:#1c1c1e; border-top:1px solid #2c2c2e;
  display:flex; height:52px;
}
.tb-tab { flex:1; border:none; background:none; color:#666; font-size:12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.tb-tab.on { color:#f5c842; }
.tb-icon { font-size:20px; line-height:1; }

/* popup override */
.leaflet-popup-content-wrapper { background:#1c1c1e!important; color:#fff!important; border:1px solid #3a3a3c!important; border-radius:12px!important; box-shadow:0 8px 30px rgba(0,0,0,.8)!important; }
.leaflet-popup-tip-container { display:none; }
.leaflet-popup-close-button { color:#666!important; font-size:20px!important; top:8px!important; right:10px!important; }
.leaflet-popup-content { margin:14px 14px!important; }

/* recenter button */
#recenter {
  position:absolute; right:14px; z-index:999;
  background:#1c1c1e; border:1px solid #3a3a3c; border-radius:10px;
  width:40px; height:40px; display:flex; align-items:center; justify-content:center;
  font-size:20px; cursor:pointer; box-shadow:0 2px 10px rgba(0,0,0,.5);
}
</style>

</div>

  <!-- tab bar -->
  <div id="tabbar">
    <button class="tb-tab on" id="tabMap"  onclick="showTab('map')"><div class="tb-icon">🗺</div>Map</button>
    <button class="tb-tab"    id="tabList" onclick="showTab('list')"><div class="tb-icon">📋</div>List</button>

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let route   = [];
let cur     = 0;
let doneArr = [];
let map, userMarker, pins = {};
let followMe = true; // auto-pan to user location

function mi(a,b){
  const R=3958.8, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function fmt(m){ return m<0.1 ? Math.round(m*5280)+'ft' : m.toFixed(1)+' mi'; }

// ═══════════════════════════════════════
// SETUP HANDLERS
// ═══════════════════════════════════════
async function startAddr(){
  const val = document.getElementById('addrIn').value.trim();
  if(!val){ setErr('Please enter your address.'); return; }
  const btn = document.getElementById('goBtn');
  btn.disabled=true; btn.textContent='Looking up...';
  setErr('');
  const q = val.toLowerCase().includes(', ma') ? val : val+', MA';
  try{
    const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q));
    const d = await r.json();
    if(!d||!d[0]) throw 0;
    boot({lat:parseFloat(d[0].lat), lng:parseFloat(d[0].lon)});
  }catch(e){
    setErr("Couldn't find that address. Try: 351 County Rd, West Wareham, MA");
    btn.disabled=false; btn.textContent='Build My Route →';
  }
}

function startGPS(){
  if(!navigator.geolocation){setErr('GPS not available.');return;}
  const btn=document.getElementById('gpsBtn');
  btn.disabled=true; btn.textContent='Getting location...';
  setErr('');
  navigator.geolocation.getCurrentPosition(
    p=>boot({lat:p.coords.latitude,lng:p.coords.longitude}),
    ()=>{setErr('GPS failed. Enter your address instead.');btn.disabled=false;btn.textContent='📡 Use My Current GPS Location';},
    {enableHighAccuracy:true,timeout:12000}
  );
}
function setErr(m){document.getElementById('errTxt').textContent=m;}

// ═══════════════════════════════════════
// BOOT APP
// ═══════════════════════════════════════
function boot(start){
  // Sort closest → furthest
  route = STOPS.map(s=>({...s,dist:mi(start,s)})).sort((a,b)=>a.dist-b.dist);
  cur=0; doneArr=[];

  // Show app
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';

  // Init map — dark tiles, centered on first stop
  map = L.map('map',{zoomControl:false,attributionControl:false})
          .setView([route[0].lat,route[0].lng],14);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {subdomains:'abcd',maxZoom:19}).addTo(map);

  // zoom control above recenter button
  L.control.zoom({position:'topright'}).addTo(map);

  // position recenter button below zoom
  const rc = document.getElementById('recenter');
  rc.style.top = '160px';

  // Stop panning when user drags map
  map.on('dragstart', ()=>{ followMe=false; });

  // Start pin
  L.marker([start.lat,start.lng],{icon:dotIcon('#aaa',14),zIndexOffset:100})
   .addTo(map).bindPopup('<b style="color:#fff">🏁 Your Start</b>');

  // Place all pins instantly
  route.forEach((s,i)=>{
    pins[i] = L.marker([s.lat,s.lng],{icon:pinIcon(i)})
      .addTo(map).on('click',()=>pinPopup(i));
  });

  // Draw thin route line connecting all stops in order
  const latlngs = route.map(s=>[s.lat,s.lng]);
  L.polyline(latlngs,{color:'#f5c842',weight:2,opacity:.35,dashArray:'4,6'}).addTo(map);

  // GPS live tracking
  liveGPS();
  redraw();
}

// ═══════════════════════════════════════
// MAP PINS
// ═══════════════════════════════════════
function pinColor(i){
  if(doneArr.includes(i)) return '#30d158';
  if(i===cur)             return '#f5c842';
  return '#ff6b35';
}

function dotIcon(color,size){
  return L.divIcon({className:'',
    html:`<div style="width:${size}px;height:${size}px;background:${color};border-radius:50%;border:2px solid rgba(0,0,0,.5);box-shadow:0 0 ${size>12?'8px '+color:'3px rgba(0,0,0,.5)'};"></div>`,
    iconSize:[size,size],iconAnchor:[size/2,size/2]});
}

function pinIcon(i){
  const c=pinColor(i), big=i===cur, s=big?18:10;
  return L.divIcon({className:'',
    html:`<div style="width:${s}px;height:${s}px;background:${c};border-radius:50%;border:${big?'2.5px solid #fff':'1.5px solid rgba(0,0,0,.4)'};box-shadow:0 0 ${big?'10px '+c:'3px rgba(0,0,0,.5)'};"></div>`,
    iconSize:[s,s],iconAnchor:[s/2,s/2]});
}

function refreshPins(){
  Object.keys(pins).forEach(i=>pins[i].setIcon(pinIcon(+i)));
}

function pinPopup(i){
  const s=route[i], done=doneArr.includes(i), isCur=i===cur;
  L.popup({maxWidth:260,closeButton:true})
   .setLatLng([s.lat,s.lng])
   .setContent(`
    <div style="font-family:-apple-system,Arial,sans-serif;">
      <div style="font-size:10px;color:#f5c842;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">
        ${isCur?'▶ NEXT STOP':done?'✓ DONE':'Stop #'+(i+1)} · ${fmt(s.dist)}
      </div>
      <div style="font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.4;">${s.a}</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;">
        ${!done
          ?`<button onclick="markDoneAt(${i})" style="background:#30d158;color:#000;border:none;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">✓ Done</button>`
          :`<button onclick="undoAt(${i})" style="background:#3a3a3c;color:#aaa;border:none;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;">↩ Undo</button>`}
        <button onclick="navAt(${i})" style="background:#0a84ff;color:#fff;border:none;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">🧭 Go Here</button>
        ${!isCur&&!done?`<button onclick="goHere(${i})" style="background:#ff6b35;color:#fff;border:none;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;">→ Make Next</button>`:''}
      </div>
    </div>`)
   .openOn(map);
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function markDone(){    markDoneAt(cur); }
function markDoneAt(i){ if(!doneArr.includes(i))doneArr.push(i); map.closePopup(); if(i===cur)advance(); redraw(); flyToCur(); }
function undoAt(i){     doneArr=doneArr.filter(x=>x!==i); map.closePopup(); redraw(); }
function skipStop(){    advance(); redraw(); flyToCur(); }
function goHere(i){     cur=i; map.closePopup(); redraw(); flyToCur(); }

function advance(){
  for(let i=cur+1;i<route.length;i++){
    if(!doneArr.includes(i)){cur=i;return;}
  }
  cur=-1;
}

function openDirections(){ navAt(cur); }
function navAt(i){
  const addr=encodeURIComponent(route[i].a);
  if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){
    window.open(`maps://maps.apple.com/?daddr=${addr}&dirflg=d`);
  }else{
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${addr}&travelmode=driving`);
  }
}

function flyToCur(){
  if(cur>=0&&route[cur]) map.flyTo([route[cur].lat,route[cur].lng],15,{duration:.7});
}

function recenterMap(){
  followMe=true;
  flyToCur();
}

// ═══════════════════════════════════════
// LIVE GPS
// ═══════════════════════════════════════
function liveGPS(){
  if(!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos=>{
    const {latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
    document.getElementById('gpsDot').classList.add('live');
    document.getElementById('gpsTxt').textContent=`GPS · ±${Math.round(acc)}m`;
    const icon=L.divIcon({className:'',
      html:`<div style="width:18px;height:18px;background:#0a84ff;border-radius:50%;border:3px solid #fff;box-shadow:0 0 14px #0a84ff;"></div>`,
      iconSize:[18,18],iconAnchor:[9,9]});
    if(!userMarker) userMarker=L.marker([lat,lng],{icon,zIndexOffset:9999}).addTo(map);
    else userMarker.setLatLng([lat,lng]);
    if(followMe) map.panTo([lat,lng],{animate:true,duration:.5});
  },()=>{
    document.getElementById('gpsTxt').textContent='GPS unavailable — use 🧭 Directions';
  },{enableHighAccuracy:true,timeout:15000,maximumAge:3000});
}

// ═══════════════════════════════════════
// REDRAW UI
// ═══════════════════════════════════════
function redraw(){
  refreshPins();
  renderList();

  const total=route.length, dLen=doneArr.length;
  const pct=Math.round(dLen/total*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('tbPct').textContent=pct+'%';

  if(cur<0){
    document.getElementById('tbStop').textContent='Done!';
    document.getElementById('tbAddr').textContent='All stops complete 🎉';
    document.getElementById('tbDist').textContent='';
    document.getElementById('mcLabel').textContent='Finished';
    document.getElementById('mcAddr').textContent='All 84 stops complete!';
    document.getElementById('mcDist').textContent='';
    return;
  }

  const s=route[cur];
  document.getElementById('tbStop').textContent=`Stop ${cur+1}/${total}`;
  document.getElementById('tbAddr').textContent=s.a.replace(', MA','');
  document.getElementById('tbDist').textContent=fmt(s.dist);
  document.getElementById('mcLabel').textContent=`Stop ${cur+1} of ${total}`;
  document.getElementById('mcAddr').textContent=s.a.replace(', MA','');
  document.getElementById('mcDist').textContent=`${fmt(s.dist)} from your start · ${dLen} done`;
}

// ═══════════════════════════════════════
// LIST
// ═══════════════════════════════════════
function renderList(){
  const el=document.getElementById('listScroll');
  const pending =route.map((_,i)=>i).filter(i=>!doneArr.includes(i));
  const doneList=route.map((_,i)=>i).filter(i=> doneArr.includes(i));
  let h=`<div class="ls-hdr">Pending · ${pending.length} stops</div>`;
  pending.forEach(i=>{
    const s=route[i],isCur=i===cur;
    h+=`<div class="ls-row ${isCur?'is-cur':''}" onclick="listTap(${i})">
      <div class="ls-n">${i+1}</div>
      <div class="ls-dot ${isCur?'cur':''}">${isCur?'▶':''}</div>
      <div class="ls-info">
        <div class="ls-addr">${s.a.replace(', MA','')}</div>
        <div class="ls-dist">${fmt(s.dist)} from start</div>
      </div>
      ${isCur?'<div class="ls-tag cur">NEXT</div>':''}
    </div>`;
  });
  if(doneList.length){
    h+=`<div class="ls-hdr">Completed · ${doneList.length}</div>`;
    doneList.forEach(i=>{
      const s=route[i];
      h+=`<div class="ls-row is-done">
        <div class="ls-n">${i+1}</div>
        <div class="ls-dot done">✓</div>
        <div class="ls-info">
          <div class="ls-addr">${s.a.replace(', MA','')}</div>
          <div class="ls-dist">${fmt(s.dist)}</div>
        </div>
        <div class="ls-tag done">done</div>
      </div>`;
    });
  }
  // add padding at bottom so last item clears the tab bar
  h+=`<div style="height:60px;"></div>`;
  el.innerHTML=h;
}

function listTap(i){
  showTab('map');
  followMe=false;
  setTimeout(()=>{
    map.flyTo([route[i].lat,route[i].lng],16,{duration:.6});
    setTimeout(()=>pinPopup(i),700);
  },80);
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function showTab(t){
  document.getElementById('tabMap').classList.toggle('on',  t==='map');
  document.getElementById('tabList').classList.toggle('on', t==='list');
  document.getElementById('listScreen').classList.toggle('on', t==='list');
  if(t==='map') setTimeout(()=>map&&map.invalidateSize(),80);
}
</script>
</body>
